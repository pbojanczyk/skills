name: stock-monitor
version: 2.0.0
description: |
  A股股票量化监控与每日推送系统。用户配置股票池后自动分析 MA/MACD/RSI/布林带，
  生成信号评分和操作建议，每日4次定时推送。支持持仓跟踪、板块轮动、北向资金、美股隔夜。
short_description: A股量化监控 + 定时推送
author: Owen
homepage: https://clawhub.com
tags:
  - stock
  - quant
  - finance
  - china
keywords:
  - stock monitor
  - A股分析
  - 量化交易
  - 技术指标
requires:
  bins:
    - python3
  python_packages:
    - akshare
    - pyyaml
platforms:
  - darwin
  - linux
license: MIT

