version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.8

trigger_tests:
  - id: explicit-character-image-generator
    should_trigger: true
    prompt: "Use the character-image-generator skill to generate a character image generator."
  - id: implicit-character-image-generator
    should_trigger: true
    prompt: "Original character portraits for me."
  - id: negative-control-character-image-generator
    should_trigger: false
    prompt: "Turn this article into a five-card RedNote series with prompt files and batch generation."

outcome_tests:
  - id: file-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "package.json"
      - file_exists: "scripts/main.ts"
      - file_exists: "references/config/first-time-setup.md"
